      title: TaggedBuilds
      description: A dictionary mapping build tag names (e.g., "latest", "beta") to their build information.
      type: object
      additionalProperties:
        anyOf:
        - $ref: '#/components/schemas/TaggedBuildInfo'
        - type: 'null'
      example:
