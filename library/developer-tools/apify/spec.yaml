components:
  securitySchemes:
    httpBearer:
      type: http
      scheme: bearer
      description: "Bearer token provided in the `Authorization` header (e.g., `Authorization: Bearer your_token`\u2014recommended). [More info](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Authorization).\n\nUse your API token to authenticate requests. You can find it on the [Integrations page](https://console.apify.com/account#/integrations) in Apify Console. This method is more secure than query parameters, as headers are not logged in browser history or server logs.\n\n:::danger Security\n\nDo not share your API token (or account password) with untrusted parties.\n\n:::\n\n_When is authentication required?_\n- _Required_ for private Actors, tasks, or resources (e.g., builds of private Actors).\n- _Required_ when using named formats for IDs (e.g., `username~store-name` for stores or `username~queue-name` for queues).\n- _Optional_ for public Actors or resources (e.g., builds of public Actors can be queried without a token).\n\nFor more information, see our [integrations documentation](https://docs.apify.com/platform/integrations)."
      x-auth-env-vars:
      - APIFY_TOKEN
    apiKey:
      type: apiKey
      name: token
      in: query
      description: "API token provided as a query parameter (e.g., `?token=your_token`\u2014less secure).\n\nUse your API token to authenticate requests. You can find it on the [Integrations page](https://console.apify.com/account#/integrations) in Apify Console.\n\n:::danger Security\n\nDo not share your API token (or account password) with untrusted parties.\n\n:::\n\n_When is authentication required?_\n- _Required_ for private Actors, tasks, or resources (e.g., builds of private Actors).\n- _Required_ when using named formats for IDs (e.g., `username~store-name` for stores or `username~queue-name` for queues).\n- _Optional_ for public Actors or resources (e.g., builds of public Actors can be queried without a token).\n\nFor more information, see our [integrations documentation](https://docs.apify.com/platform/integrations)."
      x-auth-env-vars:
      - APIFY_TOKEN
  parameters:
    offset:
      name: offset
      in: query
      description: 'Number of items that should be skipped at the start. The default value is `0`.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 0
    limit:
      name: limit
      in: query
      description: 'Maximum number of items to return. The default value as well as the maximum is `1000`.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 1000
    descCreatedAt:
      name: desc
      in: query
      description: 'If `true` or `1` then the objects are sorted by the `createdAt` field in

        descending order. By default, they are sorted in ascending order.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    actorId:
      name: actorId
      in: path
      description: Actor ID or a tilde-separated owner's username and Actor name.
      required: true
      style: simple
      schema:
        type: string
        example: janedoe~my-actor
    versionNumber:
      name: versionNumber
      in: path
      description: Actor version.
      required: true
      style: simple
      schema:
        type: string
        example: '0.1'
    descStartedAt:
      name: desc
      in: query
      description: 'If `true` or `1` then the objects are sorted by the `startedAt` field in

        descending order. By default, they are sorted in ascending order.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    waitForFinishBuild:
      name: waitForFinish
      in: query
      description: 'The maximum number of seconds the server waits for the build to finish.

        By default it is `0`, the maximum value is `60`. <!-- MAX_ACTOR_JOB_ASYNC_WAIT_SECS -->

        If the build finishes in time then the returned build object will have a

        terminal status (e.g. `SUCCEEDED`), otherwise it will have a transitional status (e.g. `RUNNING`).

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 60
    buildIdWithDefault:
      name: buildId
      in: path
      description: 'ID of the build, found in the build''s Info tab.

        Use the special value `default` to get the OpenAPI schema for the Actor''s default build.

        '
      required: true
      style: simple
      schema:
        type: string
        example: soSkq9ekdmfOslopH
    buildId:
      name: buildId
      in: path
      description: ID of the build, found in the build's Info tab.
      required: true
      style: simple
      schema:
        type: string
        example: soSkq9ekdmfOslopH
    status:
      name: status
      in: query
      description: 'Single status or comma-separated list of statuses, see ([available

        statuses](https://docs.apify.com/platform/actors/running/runs-and-builds#lifecycle)). Used to filter runs by the specified statuses only.

        '
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
        example:
        - SUCCEEDED
    startedAfter:
      name: startedAfter
      in: query
      description: 'Filter runs that started after the specified date and time (inclusive).

        The value must be a valid ISO 8601 datetime string (UTC).

        '
      style: form
      explode: true
      allowReserved: true
      schema:
        type: string
        format: date-time
        example: '2025-09-01T00:00:00.000Z'
    startedBefore:
      name: startedBefore
      in: query
      description: 'Filter runs that started before the specified date and time (inclusive).

        The value must be a valid ISO 8601 datetime string (UTC).

        '
      style: form
      explode: true
      allowReserved: true
      schema:
        type: string
        format: date-time
        example: '2025-09-17T23:59:59.000Z'
    timeout:
      name: timeout
      in: query
      description: 'Optional timeout for the run, in seconds. By default, the run uses the timeout from its configuration.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 60
    memory:
      name: memory
      in: query
      description: 'Memory limit for the run, in megabytes. The amount of memory can be set to a power of 2 with a minimum of 128.

        By default, the run uses the memory limit from its configuration.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 256
    maxItems:
      name: maxItems
      in: query
      required: false
      description: 'Specifies the maximum number of dataset items that will be charged for pay-per-result Actors.

        This does NOT guarantee that the Actor will return only this many items.

        It only ensures you won''t be charged for more than this number of items.

        Only works for pay-per-result Actors.

        Value can be accessed in the actor run using `ACTOR_MAX_PAID_DATASET_ITEMS` environment variable.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 1000
    maxTotalChargeUsd:
      name: maxTotalChargeUsd
      in: query
      required: false
      description: 'Specifies the maximum cost of the run. This parameter is

        useful for pay-per-event Actors, as it allows you to limit the amount

        charged to your subscription. You can access the maximum cost in your Actor

        by using the `ACTOR_MAX_TOTAL_CHARGE_USD` environment variable.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 5
    restartOnError:
      name: restartOnError
      in: query
      description: 'Determines whether the run will be restarted if it fails.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    build:
      name: build
      in: query
      description: 'Specifies the Actor build to run. It can be either a build tag or build number.

        By default, the run uses the build from its configuration (typically `latest`).

        '
      style: form
      explode: true
      schema:
        type: string
        example: 0.1.234
    waitForFinishRun:
      name: waitForFinish
      in: query
      description: 'The maximum number of seconds the server waits for the run to finish. By

        default it is `0`, the maximum value is `60`. <!-- MAX_ACTOR_JOB_ASYNC_WAIT_SECS -->

        If the run finishes in time then the returned run object will have a terminal status (e.g. `SUCCEEDED`),

        otherwise it will have a transitional status (e.g. `RUNNING`).

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 60
    webhooks:
      name: webhooks
      in: query
      description: 'Specifies optional webhooks associated with the Actor run, which can be used to receive a notification

        e.g. when the Actor finished or failed. The value is a Base64-encoded JSON array whose items follow

        the WebhookRepresentation schema. For more information, see

        [Webhooks documentation](https://docs.apify.com/platform/integrations/webhooks).

        '
      style: form
      explode: true
      schema:
        type: string
        contentEncoding: base64
        contentMediaType: application/json
        contentSchema:
          type: array
          items:
            $ref: '#/components/schemas/WebhookRepresentation'
        example: dGhpcyBpcyBqdXN0IGV4YW1wbGUK...
    outputRecordKey:
      name: outputRecordKey
      in: query
      description: 'Key of the record from run''s default key-value store to be returned

        in the response. By default, it is `OUTPUT`.

        '
      style: form
      explode: true
      schema:
        type: string
        example: OUTPUT
    format:
      name: format
      in: query
      description: 'Format of the results, possible values are: `json`, `jsonl`, `csv`, `html`, `xlsx`, `xml` and `rss`. The default value is `json`.

        '
      style: form
      explode: true
      schema:
        type: string
        example: json
    clean:
      name: clean
      in: query
      description: 'If `true` or `1` then the API endpoint returns only non-empty items and skips hidden fields (i.e. fields starting with the # character).

        The `clean` parameter is just a shortcut for `skipHidden=true` and `skipEmpty=true` parameters.

        Note that since some objects might be skipped from the output, that the result might contain less items than the `limit` value.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    datasetParameters_limit:
      name: limit
      in: query
      description: Maximum number of items to return. By default there is no limit.
      style: form
      explode: true
      schema:
        type: number
        format: double
    fields:
      name: fields
      in: query
      description: 'A comma-separated list of fields which should be picked from the items, only these fields will remain in the resulting record objects.

        Note that the fields in the outputted items are sorted the same way as they are specified in the `fields` query parameter.

        You can use this feature to effectively fix the output format.

        '
      style: form
      explode: true
      schema:
        type: string
        example: myValue,myOtherValue
    outputFields:
      name: outputFields
      in: query
      description: 'A comma-separated list of output field names that positionally rename the fields specified in the `fields` parameter.

        For example, `?fields=headline,url&outputFields=title,link` renames `headline` to `title` and `url` to `link` in the output.

        The number of names in `outputFields` must match the number of names in `fields`.

        Requires the `fields` parameter to be specified as well.

        '
      style: form
      explode: true
      schema:
        type: string
        example: title,link
    omit:
      name: omit
      in: query
      description: A comma-separated list of fields which should be omitted from the items.
      style: form
      explode: true
      schema:
        type: string
        example: myValue,myOtherValue
    unwind:
      name: unwind
      in: query
      description: 'A comma-separated list of fields which should be unwound, in order which they should be processed. Each field should be either an array or an object.

        If the field is an array then every element of the array will become a separate record and merged with parent object.

        If the unwound field is an object then it is merged with the parent object.

        If the unwound field is missing or its value is neither an array nor an object and therefore cannot be merged with a parent object then the item gets preserved as it is.

        Note that the unwound items ignore the `desc` parameter.

        '
      style: form
      explode: true
      schema:
        type: string
        example: myValue,myOtherValue
    flatten:
      name: flatten
      in: query
      description: 'A comma-separated list of fields which should transform nested objects into flat structures.


        For example, with `flatten="foo"` the object `{"foo":{"bar": "hello"}}` is turned into `{"foo.bar": "hello"}`.


        The original object with properties is replaced with the flattened object.

        '
      style: form
      explode: true
      schema:
        type: string
        example: myValue
    descDataset:
      name: desc
      in: query
      description: 'By default, results are returned in the same order as they were stored.

        To reverse the order, set this parameter to `true` or `1`.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    attachment:
      name: attachment
      in: query
      description: 'If `true` or `1` then the response will define the `Content-Disposition:

        attachment` header, forcing a web browser to download the file rather

        than to display it. By default this header is not present.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    delimiter:
      name: delimiter
      in: query
      description: 'A delimiter character for CSV files, only used if `format=csv`. You

        might need to URL-encode the character (e.g. use `%09` for tab or `%3B`

        for semicolon). The default delimiter is a simple comma (`,`).

        '
      style: form
      explode: true
      schema:
        type: string
        example: ;
    bom:
      name: bom
      in: query
      description: 'All text responses are encoded in UTF-8 encoding. By default, the

        `format=csv` files are prefixed with the UTF-8 Byte Order Mark (BOM), while `json`, `jsonl`, `xml`, `html` and `rss` files are not.


        If you want to override this default behavior, specify `bom=1` query parameter to include the BOM or `bom=0` to skip it.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    xmlRoot:
      name: xmlRoot
      in: query
      description: 'Overrides default root element name of `xml` output. By default the root element is `items`.

        '
      style: form
      explode: true
      schema:
        type: string
        example: items
    xmlRow:
      name: xmlRow
      in: query
      description: 'Overrides default element name that wraps each page or page function result object in `xml` output. By default the element name is `item`.

        '
      style: form
      explode: true
      schema:
        type: string
        example: item
    skipHeaderRow:
      name: skipHeaderRow
      in: query
      description: If `true` or `1` then header row in the `csv` format is skipped.
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    skipHidden:
      name: skipHidden
      in: query
      description: 'If `true` or `1` then hidden fields are skipped from the output, i.e. fields starting with the `#` character.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    skipEmpty:
      name: skipEmpty
      in: query
      description: 'If `true` or `1` then empty items are skipped from the output.


        Note that if used, the results might contain less items than the limit value.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    simplified:
      name: simplified
      in: query
      description: 'If `true` or `1` then, the endpoint applies the `fields=url,pageFunctionResult,errorInfo`

        and `unwind=pageFunctionResult` query parameters. This feature is used to emulate simplified results provided by the

        legacy Apify Crawler product and it''s not recommended to use it in new integrations.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    view:
      name: view
      in: query
      description: 'Defines the view configuration for dataset items based on the schema definition.

        This parameter determines how the data will be filtered and presented.

        For complete specification details, see the [dataset schema documentation](/platform/actors/development/actor-definition/dataset-schema).

        '
      schema:
        type: string
        example: overview
    skipFailedPages:
      name: skipFailedPages
      in: query
      description: 'If `true` or `1` then, the all the items with errorInfo property will be skipped from the output.


        This feature is here to emulate functionality of API version 1 used for the legacy Apify Crawler product and it''s not recommended to use it in new integrations.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    feedTitle:
      name: feedTitle
      in: query
      description: 'Overrides the auto-generated RSS channel `<title>` element.

        Only used when `format=rss`. If not provided, the title defaults to `Dataset <label>`.

        '
      style: form
      explode: true
      schema:
        type: string
        example: Latest posts from r/pasta
    feedDescription:
      name: feedDescription
      in: query
      description: 'Overrides the auto-generated RSS channel `<description>` element.

        Only used when `format=rss`. If not provided, the description defaults to `Items in dataset with id "<datasetId>".`

        '
      style: form
      explode: true
      schema:
        type: string
        example: Scraped forum posts
    runId:
      name: runId
      in: path
      description: Actor run ID.
      required: true
      style: simple
      schema:
        type: string
        example: 3KH8gEpp4d8uQSe8T
    buildResurrect:
      name: build
      in: query
      description: 'Specifies the Actor build to run. It can be either a build tag or build number.

        By default, the run is resurrected with the same build it originally used. Specifically,

        if a run was first started with the `latest` tag, which resolves to version `0.0.3` at the

        time, a run resurrected without this parameter will continue running with `0.0.3`, even if

        `latest` already points to a newer build.

        '
      style: form
      explode: true
      schema:
        type: string
        example: 0.1.234
    timeoutResurrect:
      name: timeout
      in: query
      description: 'Optional timeout for the run, in seconds. By default, the run uses the timeout

        specified in the run that is being resurrected.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 60
    memoryResurrect:
      name: memory
      in: query
      description: 'Memory limit for the run, in megabytes. The amount of memory can be set to a power of 2

        with a minimum of 128. By default, the run uses the memory limit specified in the run

        that is being resurrected.

        '
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 256
    restartOnErrorResurrect:
      name: restartOnError
      in: query
      description: 'Determines whether the resurrected run will be restarted if it fails.

        By default, the resurrected run uses the same setting as before.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    statusLastRun:
      name: status
      in: query
      description: Filter for the run status.
      style: form
      explode: true
      schema:
        type: string
        example: SUCCEEDED
    signature:
      name: signature
      in: query
      description: Signature used for the access.
      required: false
      style: form
      schema:
        type: string
        example: 2wTI46Bg8qWQrV7tavlPI
    exclusiveStartKey:
      name: exclusiveStartKey
      in: query
      description: All keys up to this one (including) are skipped from the result.
      schema:
        type: string
        example: Ihnsp8YrvJ8102Kj
    keyValueStoreParameters_limit:
      name: limit
      in: query
      description: Number of keys to be returned.
      schema:
        type: number
        format: int32
        minimum: 1
        maximum: 1000
        default: 1000
        example: 100
    collectionKeys:
      name: collection
      in: query
      description: Limit the results to keys that belong to a specific collection from the key-value store schema. The key-value store need to have a schema defined for this parameter to work.
      schema:
        type: string
        example: postImages
    prefixKeys:
      name: prefix
      in: query
      description: Limit the results to keys that start with a specific prefix.
      schema:
        type: string
        example: post-images-
    collectionRecords:
      name: collection
      in: query
      description: 'If specified, only records belonging to a specific collection from the key-value store schema. The key-value store need to have a schema defined for this parameter to work.

        '
      schema:
        type: string
        example: my-collection
    prefixRecords:
      name: prefix
      in: query
      description: 'If specified, only records whose key starts with the given prefix are included in the archive.

        '
      schema:
        type: string
        example: my-prefix/
    recordKey:
      name: recordKey
      in: path
      description: Key of the record.
      required: true
      style: simple
      schema:
        type: string
        example: someKey
    keyValueStoreParameters_attachment:
      name: attachment
      in: query
      description: 'If `true` or `1`, the response will be served with `Content-Disposition: attachment` header,

        causing web browsers to offer downloading HTML records instead of displaying them.

        '
      required: false
      schema:
        type: boolean
        example: true
    Content-Encoding:
      name: Content-Encoding
      in: header
      description: ''
      required: false
      style: simple
      schema:
        enum:
        - gzip
        - deflate
        - br
        - identity
        type: string
    clientKey:
      name: clientKey
      in: query
      description: 'A unique identifier of the client accessing the request queue. It must

        be a string between 1 and 32 characters long. This identifier is used to

        determine whether the queue was accessed by multiple clients. If

        `clientKey` is not provided,

        the system considers this API call to come from a new client. For

        details, see the `hadMultipleClients` field returned by the [Get

        head](#/reference/request-queues/queue-head) operation.

        '
      style: form
      explode: true
      schema:
        type: string
        example: client-abc
    exclusiveStartId:
      name: exclusiveStartId
      in: query
      description: All requests up to this one (including) are skipped from the result. (Deprecated, use `cursor` instead.)
      deprecated: true
      style: form
      explode: true
      schema:
        type: string
        example: Ihnsp8YrvJ8102Kj
    listLimit:
      name: limit
      in: query
      description: Number of keys to be returned. Maximum value is `10000`.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 100
    cursor:
      name: cursor
      in: query
      description: A cursor string for pagination, returned in the previous response as `nextCursor`. Use this to retrieve the next page of requests.
      style: form
      explode: true
      schema:
        type: string
        example: eyJyZXF1ZXN0SWQiOiI2OFRqQ2RaTDNvM2hiUU0ifQ
    filter:
      name: filter
      in: query
      description: "Filter requests by their state. Possible values are `locked` and `pending`. You can combine multiple values separated by commas, which will mean the union of these filters \u2013 requests matching any of the specified states will be returned. (Not compatible with deprecated `exclusiveStartId` parameter.)"
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          enum:
          - locked
          - pending
        example:
        - locked
    forefront:
      name: forefront
      in: query
      description: 'Determines if request should be added to the head of the queue or to the

        end. Default value is `false` (end of queue).

        '
      style: form
      explode: true
      schema:
        type: string
        example: 'false'
    contentTypeJson:
      name: Content-Type
      in: header
      description: ''
      required: true
      style: simple
      schema:
        type: string
        const: application/json
    requestId:
      name: requestId
      in: path
      description: Request ID.
      required: true
      style: simple
      schema:
        type: string
        example: xpsmkDlspokDSmklS
    lockSecs:
      name: lockSecs
      in: query
      description: How long the requests will be locked for (in seconds).
      required: true
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 60
    lockForefront:
      name: forefront
      in: query
      description: 'Determines if request should be added to the head of the queue or to the

        end after lock expires.

        '
      style: form
      explode: true
      schema:
        type: string
        example: 'false'
    deleteForefront:
      name: forefront
      in: query
      description: 'Determines if request should be added to the head of the queue or to the

        end after lock was removed.

        '
      style: form
      explode: true
      schema:
        type: string
        example: 'false'
    headLimit:
      name: limit
      in: query
      description: How many items from queue should be returned.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 100
    headLockLimit:
      name: limit
      in: query
      description: How many items from the queue should be returned.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 25
        maximum: 25
    stream:
      name: stream
      in: query
      description: 'If `true` or `1` then the logs will be streamed as long as the run or build is running.

        '
      required: false
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    download:
      name: download
      in: query
      description: 'If `true` or `1` then the web browser will download the log file rather than open it in a tab.

        '
      required: false
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    raw:
      name: raw
      in: query
      description: 'If `true` or `1`, the logs will be kept verbatim. By default, the API removes

        ANSI escape codes from the logs, keeping only printable characters.

        '
      required: false
      style: form
      explode: true
      schema:
        type: boolean
        example: false
    gracefully:
      name: gracefully
      in: query
      description: 'If true passed, the Actor run will abort gracefully.

        It will send `aborting` and `persistState` event into run and force-stop the run after 30 seconds.

        It is helpful in cases where you plan to resurrect the run later.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    targetActorId:
      name: targetActorId
      in: query
      description: ID of a target Actor that the run should be transformed into.
      required: true
      style: form
      explode: true
      schema:
        type: string
        example: HDSasDasz78YcAPEB
    actorTaskId:
      name: actorTaskId
      in: path
      description: Task ID or a tilde-separated owner's username and task's name.
      required: true
      style: simple
      schema:
        type: string
        example: janedoe~my-task
    unnamed:
      name: unnamed
      in: query
      description: 'If `true` or `1` then all the storages are returned. By default, only

        named storages are returned.

        '
      style: form
      explode: true
      schema:
        type: boolean
        example: true
    storeId:
      name: storeId
      in: path
      description: Key-value store ID or `username~store-name`.
      required: true
      style: simple
      schema:
        type: string
        example: WkzbQMuFYuamGv3YF
    datasetId:
      name: datasetId
      in: path
      description: Dataset ID or `username~dataset-name`.
      required: true
      style: simple
      schema:
        type: string
        example: WkzbQMuFYuamGv3YF
    queueId:
      name: queueId
      in: path
      description: Queue ID or `username~queue-name`.
      required: true
      style: simple
      schema:
        type: string
        example: WkzbQMuFYuamGv3YF
    webhookId:
      name: webhookId
      in: path
      description: Webhook ID.
      required: true
      style: simple
      schema:
        type: string
        example: pVJtoTelgYUq4qJOt
    scheduleId:
      name: scheduleId
      in: path
      description: Schedule ID.
      required: true
      style: simple
      schema:
        type: string
        example: asdLZtadYvn4mBZmm
    buildOrRunId:
      name: buildOrRunId
      in: path
      description: ID of the Actor build or run.
      required: true
      style: simple
      schema:
        type: string
        example: HG7ML7M8z78YcAPE
  schemas:
    PaginationResponse:
      title: PaginationResponse
      description: Common pagination fields for list responses.
      required:
      - total
      - offset
      - limit
      - desc
      - count
      type: object
      properties:
        total:
          type: integer
          description: The total number of items available across all pages.
          minimum: 0
          examples:
          - 1
        offset:
          type: integer
          description: The starting position for this page of results.
          minimum: 0
          examples:
          - 0
        limit:
          type: integer
          description: The maximum number of items returned per page.
          minimum: 1
          examples:
          - 1000
        desc:
          type: boolean
          description: Whether the results are sorted in descending order.
          examples:
          - false
        count:
          type: integer
          description: The number of items returned in this response.
          minimum: 0
          examples:
          - 1
    ActorStats:
      title: ActorStats
      type: object
      properties:
        totalBuilds:
          type: integer
          examples:
          - 9
        totalRuns:
          type: integer
          examples:
          - 16
        totalUsers:
          type: integer
          examples:
          - 6
        totalUsers7Days:
          type: integer
          examples:
          - 2
        totalUsers30Days:
          type: integer
          examples:
          - 6
        totalUsers90Days:
          type: integer
          examples:
          - 6
        totalMetamorphs:
          type: integer
          examples:
          - 2
        lastRunStartedAt:
          type: string
          format: date-time
          examples:
          - '2019-07-08T14:01:05.546Z'
    ActorShort:
      title: ActorShort
      required:
      - id
      - createdAt
      - modifiedAt
      - name
      - username
      type: object
      properties:
        id:
          type: string
          examples:
          - br9CKmk457
        createdAt:
          type: string
          format: date-time
          examples:
          - '2019-10-29T07:34:24.202Z'
        modifiedAt:
          type: string
          format: date-time
          examples:
          - '2019-10-30T07:34:24.202Z'
        name:
          type: string
          examples:
          - MyAct
        username:
          type: string
          examples:
          - janedoe
        title:
          type: string
          examples:
          - Hello World Example
        stats:
          anyOf:
          - $ref: '#/components/schemas/ActorStats'
          - type: 'null'
    ListOfActors:
      title: ListOfActors
      allOf:
      - $ref: '#/components/schemas/PaginationResponse'
      - type: object
        required:
        - items
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/ActorShort'
    ListOfActorsResponse:
      title: ListOfActorsResponse
      required:
      - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ListOfActors'
    ErrorType:
      title: ErrorType
      type: string
      description: Machine-processable error type identifier.
      enum:
      - 3d-secure-auth-failed
      - access-right-already-exists
      - action-not-found
      - actor-already-rented
      - actor-can-not-be-rented
      - actor-disabled
      - actor-is-not-rented
      - actor-memory-limit-exceeded
      - actor-name-exists-new-owner
      - actor-name-not-unique
      - actor-not-found
      - actor-not-github-actor
      - actor-not-public
      - actor-permission-level-not-supported-for-agentic-payments
      - actor-review-already-exists
      - actor-run-failed
      - actor-standby-not-supported-for-agentic-payments
      - actor-task-name-not-unique
      - agentic-payment-info-retrieval-error
      - agentic-payment-information-missing
      - agentic-payment-insufficient-amount
      - agentic-payment-provider-internal-error
      - agentic-payment-provider-unauthorized
      - airtable-webhook-deprecated
      - already-subscribed-to-paid-actor
      - apify-plan-required-to-use-paid-actor
      - apify-signup-not-allowed
      - auth-method-not-supported
      - authorization-server-not-found
      - auto-issue-date-invalid
      - background-check-required
      - billing-system-error
      - black-friday-plan-expired
      - braintree-error
      - braintree-not-linked
      - braintree-operation-timed-out
      - braintree-unsupported-currency
