    ErrorDetail:
      title: ErrorDetail
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ErrorType'
        message:
          type: string
          description: Human-readable error message describing what went wrong.
    ErrorResponse:
      title: ErrorResponse
      required:
      - error
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    VersionSourceType:
      title: VersionSourceType
      enum:
      - SOURCE_FILES
      - GIT_REPO
      - TARBALL
      - GITHUB_GIST
      type: string
    EnvVar:
      title: EnvVar
      required:
      - name
      type: object
      properties:
        name:
          type: string
          examples:
          - MY_ENV_VAR
        value:
          type: string
          description: The environment variable value. This field is absent in responses when `isSecret` is `true`, as secret values are never returned by the API.
          examples:
          - my-value
        isSecret:
          type:
          - boolean
          - 'null'
          examples:
          - false
    SourceCodeFileFormat:
      type: string
      enum:
      - BASE64
      - TEXT
      examples:
      - TEXT
    SourceCodeFile:
      title: SourceCodeFile
      type: object
      required:
      - name
      properties:
        format:
          $ref: '#/components/schemas/SourceCodeFileFormat'
        content:
          type: string
          examples:
          - console.log('This is the main.js file');
        name:
          type: string
          examples:
          - src/main.js
    SourceCodeFolder:
      title: SourceCodeFolder
      description: 'Represents a folder in the Actor''s source code structure. Distinguished from

        SourceCodeFile by the presence of the `folder` property set to `true`.

        '
      type: object
      required:
      - name
      - folder
      properties:
        name:
          type: string
          description: The folder path relative to the Actor's root directory.
          examples:
          - src/utils
        folder:
          type: boolean
          description: Always `true` for folders. Used to distinguish folders from files.
          examples:
          - true
    VersionSourceFiles:
      title: VersionSourceFiles
      type: array
      items:
        anyOf:
        - $ref: '#/components/schemas/SourceCodeFile'
        - $ref: '#/components/schemas/SourceCodeFolder'
    Version:
      title: Version
      type: object
      required:
      - versionNumber
      - sourceType
      properties:
        versionNumber:
          type: string
          examples:
          - '0.0'
        sourceType:
          anyOf:
          - $ref: '#/components/schemas/VersionSourceType'
          - type: 'null'
        envVars:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/EnvVar'
          description: ''
        applyEnvVarsToBuild:
          type:
          - boolean
          - 'null'
          examples:
          - false
        buildTag:
          type: string
          examples:
          - latest
        sourceFiles:
          $ref: '#/components/schemas/VersionSourceFiles'
        gitRepoUrl:
          type:
          - string
          - 'null'
          description: URL of the Git repository when sourceType is GIT_REPO.
        tarballUrl:
          type:
          - string
          - 'null'
          description: URL of the tarball when sourceType is TARBALL.
        gitHubGistUrl:
          type:
          - string
          - 'null'
          description: URL of the GitHub Gist when sourceType is GITHUB_GIST.
    CommonActorPricingInfo:
      title: CommonActorPricingInfo
      type: object
      required:
      - apifyMarginPercentage
      - createdAt
      - startedAt
      properties:
        apifyMarginPercentage:
          type: number
          description: In [0, 1], fraction of pricePerUnitUsd that goes to Apify
        createdAt:
          type: string
          format: date-time
          description: When this pricing info record has been created
        startedAt:
          type: string
          format: date-time
          description: Since when is this pricing info record effective for a given Actor
        notifiedAboutFutureChangeAt:
          type:
          - string
          - 'null'
          format: date-time
          x-internal: true
        notifiedAboutChangeAt:
          type:
          - string
          - 'null'
          format: date-time
          x-internal: true
        reasonForChange:
          type:
          - string
          - 'null'
          x-internal: true
    ActorChargeEvent:
      title: ActorChargeEvent
      type: object
      required:
      - eventPriceUsd
      - eventTitle
      - eventDescription
      properties:
        eventPriceUsd:
          type: number
        eventTitle:
          type: string
        eventDescription:
          type: string
    PayPerEventActorPricingInfo:
      title: PayPerEventActorPricingInfo
      allOf:
      - $ref: '#/components/schemas/CommonActorPricingInfo'
      - type: object
        required:
        - pricingModel
        - pricingPerEvent
        properties:
          pricingModel:
            type: string
            const: PAY_PER_EVENT
          pricingPerEvent:
            type: object
            properties:
              actorChargeEvents:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/ActorChargeEvent'
          minimalMaxTotalChargeUsd:
            type:
            - number
            - 'null'
    PricePerDatasetItemActorPricingInfo:
      title: PricePerDatasetItemActorPricingInfo
      allOf:
      - $ref: '#/components/schemas/CommonActorPricingInfo'
      - type: object
        required:
        - pricingModel
        - pricePerUnitUsd
        - unitName
        properties:
          pricingModel:
            type: string
            const: PRICE_PER_DATASET_ITEM
          unitName:
            type: string
            description: Name of the unit that is being charged
          pricePerUnitUsd:
            type: number
    FlatPricePerMonthActorPricingInfo:
      title: FlatPricePerMonthActorPricingInfo
      allOf:
      - $ref: '#/components/schemas/CommonActorPricingInfo'
      - type: object
        required:
        - pricingModel
        - pricePerUnitUsd
        - trialMinutes
        properties:
          pricingModel:
            type: string
            const: FLAT_PRICE_PER_MONTH
          trialMinutes:
            type: integer
            description: For how long this Actor can be used for free in trial period
          pricePerUnitUsd:
            type: number
            description: Monthly flat price in USD
    FreeActorPricingInfo:
      title: FreeActorPricingInfo
      allOf:
      - $ref: '#/components/schemas/CommonActorPricingInfo'
      - type: object
        required:
        - pricingModel
        properties:
          pricingModel:
            type: string
            const: FREE
    ActorRunPricingInfo:
      title: ActorRunPricingInfo
      discriminator:
        propertyName: pricingModel
        mapping:
          PAY_PER_EVENT: '#/components/schemas/PayPerEventActorPricingInfo'
          PRICE_PER_DATASET_ITEM: '#/components/schemas/PricePerDatasetItemActorPricingInfo'
          FLAT_PRICE_PER_MONTH: '#/components/schemas/FlatPricePerMonthActorPricingInfo'
          FREE: '#/components/schemas/FreeActorPricingInfo'
      oneOf:
      - $ref: '#/components/schemas/PayPerEventActorPricingInfo'
      - $ref: '#/components/schemas/PricePerDatasetItemActorPricingInfo'
      - $ref: '#/components/schemas/FlatPricePerMonthActorPricingInfo'
      - $ref: '#/components/schemas/FreeActorPricingInfo'
    ActorPermissionLevel:
      type: string
      description: 'Determines permissions that the Actor requires to run. For more information, see the [Actor permissions documentation](https://docs.apify.com/platform/actors/development/permissions).

