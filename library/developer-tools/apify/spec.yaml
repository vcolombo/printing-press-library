        userId:
          type: string
          examples:
          - wRsJZtadYvn4mBZmm
        actId:
          type: string
          examples:
          - asADASadYvn4mBZmm
        actName:
          type:
          - string
          - 'null'
          examples:
          - my-actor
        name:
          type: string
          examples:
          - my-task
        username:
          type:
          - string
          - 'null'
          examples:
          - janedoe
        actUsername:
          type:
          - string
          - 'null'
          examples:
          - janedoe
        createdAt:
          type: string
          format: date-time
          examples:
          - '2018-10-26T07:23:14.855Z'
        modifiedAt:
          type: string
          format: date-time
          examples:
          - '2018-10-26T13:30:49.578Z'
        stats:
          anyOf:
          - $ref: '#/components/schemas/TaskStats'
          - type: 'null'
    ListOfTasks:
      title: ListOfTasks
      allOf:
      - $ref: '#/components/schemas/PaginationResponse'
      - type: object
        required:
        - items
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/TaskShort'
    ListOfTasksResponse:
      title: ListOfTasksResponse
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/ListOfTasks'
    TaskOptions:
      title: TaskOptions
      type: object
      properties:
        build:
          type:
          - string
          - 'null'
          examples:
          - latest
        timeoutSecs:
          type:
          - integer
          - 'null'
          examples:
          - 300
        memoryMbytes:
