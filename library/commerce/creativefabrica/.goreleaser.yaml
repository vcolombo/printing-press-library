version: 2
project_name: creativefabrica-pp-cli
changelog:
  disable: true
builds:
  - id: creativefabrica-pp-cli
    main: ./cmd/creativefabrica-pp-cli
    binary: creativefabrica-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/creativefabrica/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: creativefabrica-pp-mcp
    main: ./cmd/creativefabrica-pp-mcp
    binary: creativefabrica-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: creativefabrica-pp-cli
    repository:
      owner: vcolombo
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search Creative Fabrica's 20-million-plus fonts, graphics, crafts"
    install: |
      bin.install "creativefabrica-pp-cli"
      bin.install "creativefabrica-pp-mcp"
