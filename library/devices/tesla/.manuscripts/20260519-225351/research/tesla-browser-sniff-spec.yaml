name: tesla
description: 'Tesla mobile API: vehicle data, climate, locks, remote start, charging queue, diagnostics, products, and service
  appointments'
version: 0.1.0
base_url: https://owner-api.teslamotors.com
spec_source: sniffed
http_transport: standard
auth:
  type: bearer_token
  header: Authorization
  format: ''
  env_vars:
  - TESLA_AUTH_TOKEN
  env_var_specs:
  - name: TESLA_AUTH_TOKEN
    kind: per_call
    required: true
    sensitive: true
    description: Tesla iOS-app OAuth bearer token (8-hour TTL). Mint via tesla auth login.
config:
  format: toml
  path: ~/.config/tesla-pp-cli/config.toml
resources:
  charging:
    description: Supercharger queue position and charging status
    endpoints:
      get_queue:
        method: GET
        path: /api/1/charging/queue
        description: Current Supercharger queue position (which stall, ETA)
        params:
        - name: vin
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: object
          item: queue
        pagination: null
        observed_auth:
        - authorization
  diagnostics:
    description: Vehicle diagnostic feature config
    endpoints:
      get_diagnostics:
        method: GET
        path: /api/1/diagnostics
        description: Vehicle diagnostic feature flags
        params: []
        body: []
        response:
          type: object
          item: diagnostics
        pagination: null
        observed_auth:
        - authorization
  energy_sites:
    description: Powerwall and solar energy site config
    endpoints:
      get_rate_tariffs:
        method: GET
        path: /api/1/energy_sites/rate_tariffs
        description: Utility rate plans for Powerwall scheduling
        params:
        - name: language
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: object
          item: rate_tariffs
        pagination: null
        observed_auth:
        - authorization
  logs:
    description: Client-side telemetry sink
    endpoints:
      create_logs:
        method: POST
        path: /api/1/logs
        description: Forward client-side log events (mostly internal use)
        params: []
        body:
        - name: details
          type: object
          required: true
          positional: false
          default: null
          description: ''
          fields:
          - name: app_id
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
            format: uuid
          - name: app_instance_id
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
            format: uuid
          - name: app_mode
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: app_state
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: app_version
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: build_number
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: central_state
