          fields: []
        - name: bluetooth_enabled
          type: boolean
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: device_token
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: device_type
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: kind
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: locale
