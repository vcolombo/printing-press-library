    endpoints:
      create_keys:
        method: POST
        path: /api/1/users/keys
        description: Add a virtual phone key or BLE key
        params: []
        body:
        - name: battery_level
          type: integer
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: bluetooth_authorization
