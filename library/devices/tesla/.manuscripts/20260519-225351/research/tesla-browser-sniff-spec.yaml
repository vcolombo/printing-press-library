          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: device_token
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: device_type
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: locale
          type: string
          required: true
          positional: false
          default: null
          description: ''
          fields: []
        - name: notification_preferences
          type: object
          required: true
          positional: false
          default: null
          description: ''
