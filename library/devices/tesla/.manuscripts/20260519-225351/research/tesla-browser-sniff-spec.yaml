            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: history
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: last_beacon_signal_seconds_ago
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: launch_time
            type: integer
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: os_version
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: peripheral
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: pid
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: platform
            type: string
            required: true
