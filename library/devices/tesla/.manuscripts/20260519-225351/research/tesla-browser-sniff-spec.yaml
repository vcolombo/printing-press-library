        method: POST
        path: /api/1/vehicles/{vehicle_id}/command/auto_conditioning_start
        description: POST /api/1/vehicles/{vehicle_id}/command/auto_conditioning_start
        params:
        - name: vehicle_id
          type: string
          required: true
          positional: true
          default: null
          description: Vehicle id from /api/1/products (the integer id field, NOT the VIN)
          fields: []
        body: []
        response:
          type: object
          item: auto_conditioning_start
        pagination: null
        observed_auth:
