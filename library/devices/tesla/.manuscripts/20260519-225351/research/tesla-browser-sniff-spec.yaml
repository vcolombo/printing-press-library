          - name: process_uptime
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: seconds_from_GMT
            type: integer
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: state_machine_state
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: state_restoration
            type: string
            required: true
            positional: false
            default: null
            description: ''
            fields: []
          - name: system_uptime
            type: string
            required: true
