name: tesla
description: 'Tesla mobile API: vehicle data, climate, locks, remote start, charging queue, diagnostics, products, and service
  appointments'
version: 0.1.0
base_url: https://owner-api.teslamotors.com
spec_source: sniffed
http_transport: standard
auth:
  type: bearer_token
  header: Authorization
  format: ''
  env_vars:
  - TESLA_AUTH_TOKEN
  env_var_specs:
  - name: TESLA_AUTH_TOKEN
    kind: per_call
    required: true
    sensitive: true
    description: Tesla iOS-app OAuth bearer token (8-hour TTL). Mint via tesla auth login.
config:
  format: toml
  path: ~/.config/tesla-pp-cli/config.toml
resources:
  charging:
    description: Supercharger queue position and charging status
    endpoints:
      get_queue:
        method: GET
        path: /api/1/charging/queue
        description: Current Supercharger queue position (which stall, ETA)
        params:
        - name: vin
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: object
          item: queue
        pagination: null
        observed_auth:
        - authorization
  diagnostics:
    description: Vehicle diagnostic feature config
    endpoints:
      get_diagnostics:
        method: GET
        path: /api/1/diagnostics
        description: Vehicle diagnostic feature flags
        params: []
        body: []
        response:
          type: object
          item: diagnostics
        pagination: null
        observed_auth:
        - authorization
  energy_sites:
    description: Powerwall and solar energy site config
    endpoints:
      get_rate_tariffs:
        method: GET
        path: /api/1/energy_sites/rate_tariffs
        description: Utility rate plans for Powerwall scheduling
        params:
        - name: language
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: object
          item: rate_tariffs
        pagination: null
        observed_auth:
        - authorization
      get_site_info:
        method: GET
        path: /api/1/energy_sites/{site_id}/site_info
        description: Energy site config (capacity, type, address)
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body: []
        response:
          type: object
          item: get_site_info
        pagination: null
      get_live_status:
        method: GET
        path: /api/1/energy_sites/{site_id}/live_status
        description: Real-time Powerwall solar/grid/battery power
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body: []
        response:
          type: object
          item: get_live_status
        pagination: null
      get_site_status:
        method: GET
        path: /api/1/energy_sites/{site_id}/site_status
        description: Backup-reserve and operation mode
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body: []
        response:
          type: object
          item: get_site_status
        pagination: null
      get_calendar_history:
        method: GET
        path: /api/1/energy_sites/{site_id}/calendar_history
        description: Historical energy data per day/month
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body:
        - name: kind
          type: string
          required: true
          description: energy | power | self_consumption | savings
        - name: period
          type: string
          required: true
          description: day | month | year
        response:
          type: object
          item: get_calendar_history
        pagination: null
      create_set_backup_reserve:
        method: POST
        path: /api/1/energy_sites/{site_id}/backup
        description: Set Powerwall backup reserve percent
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body:
        - name: backup_reserve_percent
          type: integer
          required: true
          description: Percent 0-100
        response:
          type: object
          item: create_set_backup_reserve
        pagination: null
      create_set_operation:
        method: POST
        path: /api/1/energy_sites/{site_id}/operation
        description: Set Powerwall operation mode
        params:
        - name: site_id
          type: string
          required: true
          positional: true
          description: Energy site id from /api/1/products
          fields: []
        body:
        - name: default_real_mode
          type: string
          required: true
          description: self_consumption | backup | autonomous
        response:
          type: object
          item: create_set_operation
        pagination: null
