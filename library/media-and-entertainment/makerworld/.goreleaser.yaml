version: 2
project_name: makerworld-pp-cli
changelog:
  disable: true
builds:
  - id: makerworld-pp-cli
    main: ./cmd/makerworld-pp-cli
    binary: makerworld-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/makerworld/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: makerworld-pp-mcp
    main: ./cmd/makerworld-pp-mcp
    binary: makerworld-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: makerworld-pp-cli
    repository:
      owner: vcolombo
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every MakerWorld model, searchable offline — plus trend deltas, designer-watch"
    install: |
      bin.install "makerworld-pp-cli"
      bin.install "makerworld-pp-mcp"
