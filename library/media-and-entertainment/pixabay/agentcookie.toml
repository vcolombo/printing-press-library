# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "pixabay-pp-cli"
display_name = "Pixabay"
description = "Every Pixabay search filter the API has — plus a 24-hour local cache, offline search, resumable downloads with built-in attribution, live rate-limit awareness, and agent-native JSON no other Pixabay tool ships."
project_kind = "cli"

[secrets.file]
path = "~/.config/pixabay-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
PIXABAY_API_KEY = true
