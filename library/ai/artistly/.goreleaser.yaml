version: 2
project_name: artistly-pp-cli
changelog:
  disable: true
builds:
  - id: artistly-pp-cli
    main: ./cmd/artistly-pp-cli
    binary: artistly-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/artistly/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: artistly-pp-mcp
    main: ./cmd/artistly-pp-mcp
    binary: artistly-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: artistly-pp-cli
    repository:
      owner: vcolombo
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The first CLI for Artistly — scriptable AI image generation, batch runs"
    install: |
      bin.install "artistly-pp-cli"
      bin.install "artistly-pp-mcp"
