version: 2
project_name: placeit-pp-cli
changelog:
  disable: true
builds:
  - id: placeit-pp-cli
    main: ./cmd/placeit-pp-cli
    binary: placeit-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/placeit/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: placeit-pp-mcp
    main: ./cmd/placeit-pp-mcp
    binary: placeit-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: placeit-pp-cli
    repository:
      owner: vcolombo
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every one of Placeit's 164k mockup, logo, video, and design templates — searchable, sortable by real popularity"
    install: |
      bin.install "placeit-pp-cli"
      bin.install "placeit-pp-mcp"
