name: semrush
description: "Every Semrush v3 Analytics + v3 Projects feature, plus a local SQLite store, snapshot diffs, gap analyses, and a per-call credit ledger no other Semrush tool has."
version: "0.1.0"
base_url: "https://api.semrush.com"
category: marketing
health_check_path: "/management/v1/projects"
http_transport: standard

auth:
  type: api_key
  in: query
  header: key
  env_vars:
    - SEMRUSH_API_KEY

config:
  format: toml
  path: "~/.config/semrush-pp-cli/config.toml"

cache:
  enabled: true
  stale_after: 168h

mcp:
  transport: [stdio, http]
  orchestration: code
  endpoint_tools: hidden

resources:

  # ============================================================
  # Account / utility
  # ============================================================
  account:
    description: "Account utilities (API units balance)"
    base_url: "https://www.semrush.com"
    endpoints:
      balance:
        method: GET
        path: "/users/countapiunits.html"
        description: "Get remaining API units balance (free probe; no units cost)"
        response:
          type: object
          item: UnitsBalance

  # ============================================================
  # Domain analytics (v3) — CSV responses, query-auth, root path `/`
  # ============================================================
  domain:
    description: "Domain analytics: overview, organic/paid keywords, competitors, pages, ad history"
    endpoints:
      overview:
        method: GET
        path: "/"
        description: "Domain Overview (one database). 10 units/line. Live or historical rankings in one regional database."
        params:
          - name: type
            type: string
            required: true
            default: "domain_rank"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain (e.g., example.com)"
          - name: database
            type: string
            default: "us"
            description: "Database/country code (us, uk, ca, au, de, fr, es, it, br, in, ...)"
          - name: display_date
            flag_name: date
            type: string
            description: "Snapshot date in YYYYMM15 format (omit for current)"
          - name: export_columns
            type: string
            default: "Dn,Rk,Or,Ot,Oc,Ad,At,Ac"
            description: "Columns (Dn=domain, Rk=rank, Or=organic kws, Ot=organic traffic, Oc=organic cost, Ad/At/Ac=paid)"
        response:
          type: object
          item: DomainOverview

      overview-all:
        method: GET
        path: "/"
        description: "Domain Overview (all databases). 10 units/line. ~140 lines covering every regional database."
        params:
          - name: type
            type: string
            required: true
            default: "domain_ranks"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: display_limit
            flag_name: limit
            type: int
            default: 200
            description: "Max database rows"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_date
            flag_name: date
            type: string
            description: "Snapshot date in YYYYMM15 format"
          - name: export_columns
            type: string
            default: "Db,Dn,Rk,Or,Ot,Oc,Ad,At,Ac,Sh,Sv"
            description: "Columns (Db=database, Sh=PLA kws, Sv=PLA uniques)"
        response:
          type: array
          item: DomainOverview

      overview-history:
        method: GET
        path: "/"
        description: "Domain Overview (history). 10 units/line. Monthly historical rankings for one database (back to 2012-2016)."
        params:
          - name: type
            type: string
            required: true
            default: "domain_rank_history"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 24
            description: "Max history rows (months)"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_daily
            flag_name: daily
            type: string
            description: "Set to 1 for daily rather than monthly history (last 31 days)"
          - name: export_columns
            type: string
            default: "Rk,Or,Ot,Oc,Ad,At,Ac,Dt"
            description: "Columns (Dt=date)"
        response:
          type: array
          item: DomainRankHistoryRow

      organic-keywords:
        method: GET
        path: "/"
        description: "Domain Organic Search Keywords. 30 units/line. Keywords a domain ranks for in Google's top 100 organic results."
        params:
          - name: type
            type: string
            required: true
            default: "domain_organic"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max keywords"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_filter
            flag_name: filter
            type: string
            description: "URL-encoded filter string (see Semrush filter syntax)"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key (e.g., tr_desc, nq_desc, po_asc)"
          - name: display_date
            flag_name: date
            type: string
            description: "Snapshot date in YYYYMM15 format"
          - name: export_columns
            type: string
            default: "Ph,Po,Pp,Pd,Nq,Cp,Co,Tr,Tc,Ur,Kd,Td"
            description: "Columns (Ph=phrase, Po=pos, Pp=prev pos, Pd=delta, Nq=volume, Tr=traffic %, Kd=difficulty)"
        response:
          type: array
          item: DomainOrganicKeyword

      paid-keywords:
        method: GET
        path: "/"
        description: "Domain Paid Search Keywords. 30 units/line. Keywords a domain buys in Google Ads."
        params:
          - name: type
            type: string
            required: true
            default: "domain_adwords"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max keywords"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_filter
            flag_name: filter
            type: string
            description: "URL-encoded filter string"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key"
          - name: display_date
            flag_name: date
            type: string
            description: "Snapshot date in YYYYMM15 format"
          - name: export_columns
            type: string
            default: "Ph,Po,Pp,Pd,Ab,Nq,Cp,Tr,Tc,Ur,Tt,Ds,Vu"
            description: "Columns (Ab=ad block, Tt=ad title, Ds=ad description, Vu=visible URL)"
        response:
          type: array
          item: DomainPaidKeyword

      competitors-organic:
        method: GET
        path: "/"
        description: "Competitors in Organic Search. 40 units/line. Domains sharing organic keywords with the target."
        params:
          - name: type
            type: string
            required: true
            default: "domain_organic_organic"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 20
            description: "Max competitors"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key (cr_desc, np_desc, ...)"
          - name: export_columns
            type: string
            default: "Dn,Cr,Np,Or,Ot,Oc,Ad"
            description: "Columns (Cr=competitor relevance, Np=common kws)"
        response:
          type: array
          item: DomainCompetitor

      competitors-paid:
        method: GET
        path: "/"
        description: "Competitors in Paid Search. 40 units/line. Domains overlapping the target's Google Ads keyword set."
        params:
          - name: type
            type: string
            required: true
            default: "domain_adwords_adwords"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 20
            description: "Max competitors"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key"
          - name: export_columns
            type: string
            default: "Dn,Cr,Np,Ad,At,Ac,Or"
            description: "Columns"
        response:
          type: array
          item: DomainCompetitor

      competitors-pla:
        method: GET
        path: "/"
        description: "PLA Competitors. 40 units/line. Domains overlapping the target's Google Shopping PLA keyword set."
        params:
          - name: type
            type: string
            required: true
            default: "domain_shopping_competitors"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 20
            description: "Max competitors"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: export_columns
            type: string
            default: "Dn,Cr,Np,Sh,Ad,At,Ac"
            description: "Columns (Sh=PLA keywords)"
        response:
          type: array
          item: DomainCompetitor

      ad-history:
        method: GET
        path: "/"
        description: "Domain Ad History. 100 units/line. 12-month archive of ad copies a domain ran for paid keywords."
        params:
          - name: type
            type: string
            required: true
            default: "domain_adwords_historical"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 50
            description: "Max history rows"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key"
          - name: export_columns
            type: string
            default: "Ph,Po,Cv,Nq,Cp,Tr,Ur,Tt,Ds,Vu,Dt"
            description: "Columns (Cv=coverage %, Dt=date)"
        response:
          type: array
          item: AdHistoryRow

      ad-copies:
        method: GET
        path: "/"
        description: "Domain Ads Copies. 20 units/line. Unique ad creatives a domain has run (title + description)."
        params:
          - name: type
            type: string
            required: true
            default: "domain_adwords_unique"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 50
            description: "Max ad copies"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: export_columns
            type: string
            default: "Tt,Ds,Ur,Pc,Un"
            description: "Columns (Tt=title, Ds=desc, Pc=keyword count, Un=ad id)"
        response:
          type: array
          item: AdCopy

      pla-keywords:
        method: GET
        path: "/"
        description: "Domain PLA Search Keywords. 30 units/line. Google Shopping PLA keywords for a domain."
