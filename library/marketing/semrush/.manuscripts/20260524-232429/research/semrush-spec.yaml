  # ============================================================
  # Projects API (JSON responses, query-auth)
  # ============================================================
  project:
    description: "Manage Semrush Projects (containers for Position Tracking, Site Audit, Listings)"
    endpoints:
      list:
        method: GET
        path: "/management/v1/projects"
        description: "List all projects on your account. Free (no API units)."
        response:
          type: array
          item: Project

      get:
        method: GET
        path: "/management/v1/projects/{project_id}"
        description: "Get a single project by ID. Free (no API units)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: object
          item: Project

      create:
        method: POST
        path: "/management/v1/projects"
        description: "Create a new Semrush project (container) with a name and root domain."
        body:
          - name: name
            type: string
            required: true
            description: "Project name"
          - name: url
            type: string
            required: true
            description: "Root domain (e.g., example.com)"
        response:
          type: object
          item: Project

      update:
        method: PUT
        path: "/management/v1/projects/{project_id}"
        description: "Update an existing project's name/url."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        body:
          - name: name
            type: string
            description: "New project name"
          - name: url
            type: string
            description: "New root domain"
        response:
          type: object
          item: Project

      delete:
        method: DELETE
        path: "/management/v1/projects/{project_id}"
        description: "Delete a project. CLI requires --yes to confirm; otherwise dry-runs."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: object
          item: ProjectDeleteResult

  # ============================================================
  # Site Audit (v3)
  # ============================================================
  audit:
    description: "Site Audit: enable, run, list snapshots, drill into issues and pages"
    endpoints:
      enable:
        method: POST
        path: "/management/v1/projects/{project_id}/siteaudit/enable"
        description: "Enable Site Audit on a project. One-time per project. Free (config call)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        body:
          - name: domain
            type: string
            required: true
            description: "Root domain to crawl"
          - name: scope
            type: string
            description: "domain | subdomain | subfolder"
          - name: limit
            type: int
            description: "Max pages to crawl per run"
          - name: crawl_subdomains
            type: bool
            description: "Crawl subdomains too"
          - name: user_agent
            type: string
            description: "Crawl user-agent (SemrushBot, GoogleBot, ...)"
        response:
          type: object
          item: AuditCampaign

      edit:
        method: POST
        path: "/management/v1/projects/{project_id}/siteaudit/save"
        description: "Edit Site Audit campaign settings (page limit, user-agent, scope, etc.)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        body:
          - name: domain
            type: string
            description: "Root domain to crawl"
          - name: scope
            type: string
            description: "domain | subdomain | subfolder"
          - name: limit
            type: int
            description: "Max pages per run"
          - name: crawl_subdomains
            type: bool
            description: "Crawl subdomains too"
          - name: user_agent
            type: string
            description: "Crawl user-agent"
        response:
          type: object
          item: AuditCampaign

      snapshots:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/snapshots"
        description: "List Site Audit snapshots for a project. Free (no API units)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: array
          item: AuditSnapshot

      issue-catalog:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/meta/issues"
        description: "Get text descriptions for all Site Audit issue codes. Free."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: array
          item: AuditIssueDef

      run:
        method: POST
        path: "/reports/v1/projects/{project_id}/siteaudit/launch"
        description: "Trigger a new Site Audit crawl. Free to launch; counts against page-credit pool."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: object
          item: AuditRunResult

      campaign-info:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/info"
        description: "Get Site Audit campaign configuration and current status."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: object
          item: AuditCampaign

      snapshot-info:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/snapshot"
        description: "Get aggregated counts for a snapshot (errors/warnings/notices, total checks)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
          - name: snapshot_id
            type: string
            required: true
            description: "Snapshot ID (from 'audit snapshots')"
        response:
          type: object
          item: AuditSnapshot

      issue:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/snapshot/{snapshot_id}/issue/{issue_id}"
        description: "Detailed report for one issue in a snapshot (affected pages, status)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
          - name: snapshot_id
            type: string
            required: true
            positional: true
            description: "Snapshot ID"
          - name: issue_id
            type: string
            required: true
            positional: true
            description: "Issue ID (see 'audit issue-catalog')"
          - name: limit
            type: int
            default: 100
            description: "Max affected pages"
          - name: page
            type: int
            description: "Page number for pagination"
          - name: filter
            type: string
            description: "Filter string"
          - name: sort
            type: string
            description: "Sort key"
        response:
          type: object
          item: AuditIssueDetail

      page-by-url:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/page/list"
        description: "Look up the page_id for a given URL within a snapshot."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
          - name: url
            type: string
            required: true
            description: "URL to look up"
          - name: limit
            type: int
            default: 10
            description: "Max matches"
        response:
          type: array
          item: AuditPageRef

      page:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/page/{page_id}"
        description: "Get full details for one crawled page (issues found, status, metrics)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
          - name: page_id
            type: string
            required: true
            positional: true
            description: "Page ID (from 'audit page-by-url')"
        response:
          type: object
          item: AuditPage

      history:
        method: GET
        path: "/reports/v1/projects/{project_id}/siteaudit/history"
        description: "Site Audit snapshots history (time series of issue counts and score)."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
          - name: limit
            type: int
            default: 30
            description: "Max history rows"
          - name: offset
            type: int
            description: "Skip N rows before returning"
        response:
          type: array
          item: AuditHistoryRow

  # ============================================================
  # Position Tracking (v3)
  #   Mutations live under /management/v1/projects/{id}/...
  #   Reports share path /reports/v1/projects/{campaign_id}/tracking/ with type=... and action=report
  # ============================================================
  tracking:
    description: "Position Tracking: create campaign, manage keywords/tags/competitors, organic and paid reports"
    endpoints:
      create:
        method: POST
        path: "/management/v1/projects/{project_id}/tracking/enable"
        description: "Create a Position Tracking campaign on a project."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        body:
          - name: url
            type: string
            required: true
            description: "Tracked URL pattern (e.g., *.example.com/*)"
          - name: location
            type: string
            description: "Geo target (use 'tracking location-search' to find the location_id)"
          - name: location_id
            type: int
            description: "Numeric location ID from 'tracking location-search'"
          - name: device
            type: string
            default: "desktop"
            description: "desktop | mobile | tablet"
          - name: language_code
            type: string
            default: "en"
            description: "Language code"
          - name: keywords
            type: string
            description: "Comma-separated initial keyword list"
          - name: competitors
            type: string
            description: "Comma-separated competitor domains"
          - name: search_engine
            type: string
            description: "Google search engine domain (e.g., google.com)"
        response:
          type: object
          item: TrackingCampaign

      emails-enable:
        method: PUT
        path: "/management/v1/projects/{campaign_id}/tracking/notifications"
        description: "Enable weekly status emails for a Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        response:
          type: object
          item: TrackingOperationResult

      emails-disable:
        method: DELETE
        path: "/management/v1/projects/{campaign_id}/tracking/notifications"
        description: "Disable weekly status emails for a Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        response:
          type: object
          item: TrackingOperationResult

      keywords-add:
        method: PUT
        path: "/management/v1/projects/{campaign_id}/keywords"
        description: "Add keywords to an existing Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: keywords
            type: string
            required: true
            description: "Comma-separated keyword list (becomes JSON array)"
          - name: tags
            type: string
            description: "Comma-separated tags to attach to these keywords"
        response:
          type: object
          item: TrackingOperationResult

      keywords-remove:
        method: DELETE
        path: "/management/v1/projects/{campaign_id}/keywords"
        description: "Remove keywords from an existing Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: keywords
            type: string
            required: true
            description: "Comma-separated keyword list to remove"
        response:
          type: object
          item: TrackingOperationResult

      tags-add:
        method: PUT
        path: "/management/v1/projects/{campaign_id}/tags"
        description: "Add tags to existing keywords in a Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: keywords
            type: string
            required: true
            description: "Comma-separated keyword list"
          - name: tags
            type: string
            required: true
            description: "Comma-separated tags to apply"
        response:
          type: object
          item: TrackingOperationResult

      tags-remove:
        method: DELETE
        path: "/management/v1/projects/{campaign_id}/tags"
        description: "Remove tags from existing keywords in a Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: keywords
            type: string
            required: true
            description: "Comma-separated keyword list"
          - name: tags
            type: string
            required: true
            description: "Comma-separated tags to remove"
        response:
          type: object
          item: TrackingOperationResult

      competitors-add:
        method: PUT
        path: "/management/v1/projects/{campaign_id}/competitors"
        description: "Add competitors to an existing Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: competitors
            type: string
            required: true
            description: "Comma-separated competitor domains"
        response:
          type: object
          item: TrackingOperationResult

      competitors-remove:
        method: DELETE
        path: "/management/v1/projects/{campaign_id}/competitors"
        description: "Remove competitors from an existing Position Tracking campaign."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
        body:
          - name: competitors
            type: string
            required: true
            description: "Comma-separated competitor domains"
        response:
          type: object
          item: TrackingOperationResult

      campaigns:
        method: GET
        path: "/management/v1/projects/{project_id}/tracking/campaigns"
        description: "List Position Tracking campaigns under a project. Use this to find the campaign_id."
        params:
          - name: project_id
            type: string
            required: true
            positional: true
            description: "Numeric project ID"
        response:
          type: object
          item: TrackingCampaignList

      location-search:
        method: GET
        path: "/position-tracking/management/v1/info/locations"
        description: "Universal location search (returns location IDs for cities/regions/countries)."
        params:
          - name: query
            type: string
            required: true
            description: "Location text to search (e.g., 'San Francisco')"
          - name: country
            type: string
            description: "Restrict to country code (e.g., 'US')"
          - name: limit
            type: int
            default: 20
            description: "Max matches"
        response:
          type: array
          item: TrackingLocation

      dates:
        method: GET
        path: "/reports/v1/projects/{campaign_id}/tracking/"
        description: "Available snapshot dates for a tracking campaign (used by --snapshot flag elsewhere)."
        params:
          - name: campaign_id
            type: string
            required: true
            positional: true
            description: "Position Tracking campaign ID"
          - name: type
            type: string
            required: true
            default: "tracking_campaign_dates"
            description: "Report type (do not override)"
          - name: action
            type: string
