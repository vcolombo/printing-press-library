            type: string
            required: true
            default: "domain_shopping"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max keywords"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key"
          - name: export_columns
            type: string
            default: "Ph,Po,Pp,Pd,Nq,Cp,Ur,Tt,Pr,Sn"
            description: "Columns (Pr=product price, Sn=shop name)"
        response:
          type: array
          item: PLAKeyword

      pla-copies:
        method: GET
        path: "/"
        description: "Domain PLA Copies. 20 units/line. Unique PLA ad creatives (title, price, shop)."
        params:
          - name: type
            type: string
            required: true
            default: "domain_shopping_unique"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 50
            description: "Max PLA copies"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: export_columns
            type: string
            default: "Tt,Ur,Pr,Pc,Un"
            description: "Columns"
        response:
          type: array
          item: PLACopy

      organic-pages:
        method: GET
        path: "/"
        description: "Domain Organic Pages. 30 units/line. Top organic landing pages on a domain by traffic."
        params:
          - name: type
            type: string
            required: true
            default: "domain_organic_pages"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max pages"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: display_sort
            flag_name: sort
            type: string
            description: "Sort key (tg_desc by default useful)"
          - name: export_columns
            type: string
            default: "Ur,Pc,Tg,Tr,Sr,St"
            description: "Columns (Ur=URL, Pc=keyword count, Tg=traffic, Tr=traffic %, Sr=SERP-feature positions, St=SERP-feature traffic)"
        response:
          type: array
          item: DomainOrganicPage

      subdomains:
        method: GET
        path: "/"
        description: "Domain Organic Subdomains. 30 units/line. Subdomains of a domain ranked by organic traffic."
        params:
          - name: type
            type: string
            required: true
            default: "domain_organic_subdomains"
            description: "v3 report type (do not override)"
          - name: domain
            type: string
            required: true
            positional: true
            description: "Root domain"
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max subdomains"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: export_columns
            type: string
            default: "Ur,Pc,Tg,Tr,Sr,St"
            description: "Columns"
        response:
          type: array
          item: DomainOrganicPage

      compare:
        method: GET
        path: "/"
        description: "Domain vs. Domain. 80 units/line. Side-by-side keyword overlap between 2-5 domains."
        params:
          - name: type
            type: string
            required: true
            default: "domain_domains"
            description: "v3 report type (do not override)"
          - name: domains
            type: string
            required: true
            description: "Semrush 'domains' param string (e.g., '*|or|example.com|*|or|other.com'). The CLI command 'domain compare' wraps this."
          - name: database
            type: string
            default: "us"
            description: "Database/country code"
          - name: display_limit
            flag_name: limit
            type: int
            default: 100
            description: "Max overlap keywords"
          - name: display_offset
            flag_name: offset
            type: int
            description: "Skip N rows before returning"
          - name: export_columns
            type: string
            default: "Ph,P0,P1,P2,P3,P4,Nq,Cp,Co,Kd,Tr,Td"
            description: "Columns (P0-P4 = position of each compared domain)"
        response:
          type: array
          item: DomainCompareRow

