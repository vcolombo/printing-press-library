name: Verify library conventions

# PR-time guards for four invariants that local builds and the existing
# verify-skills.yml / verify-manifests.yml workflows do not catch:
#
# 1. registry.json and cli-skills/pp-*/SKILL.md are generated artifacts
#    regenerated post-merge by generate-registry.yml and
#    generate-skills.yml and committed back to main with [skip ci]. PR
#    commits that touch these files cause silent overwrite on the next
#    regen and produce gnarly merge conflicts in the interim. The single
#    rule is: don't commit them in PRs. The fix is identical for fork
#    and same-repo PRs (drop the files from the diff and let post-merge
#    regen produce them), so the workflow no longer auto-fixes drift or
#    distinguishes between fork and same-repo origin.
#
# 2. library/<cat>/<slug>/go.mod's declared `module` path must match
#    its directory location (github.com/mvanhorn/printing-press-library/<dirpath>).
#    A mismatch compiles fine locally because the package is internally
#    self-consistent, but every public install via `go install …@latest`
#    fails downstream with a "module declares its path as X but was
#    required as Y" error after the proxy has already served the zip.
#    The hubspot CLI shipped with this exact bug for some time before
#    being caught.
#
# 3. Every published CLI manifest must carry printer attribution, and
#    existing CLI attribution must not change in the same PR as CLI
#    behavior or docs. The printer / author fields are reviewable when
#    corrected in an attribution-only PR, but a normal CLI improvement
#    PR should never accidentally claim ownership of someone else's CLI.
#
# 4. Newly added library CLI packages must include the publish-package
#    artifacts and provenance that reviewers need to audit the print:
#    per-CLI AGENTS.md, patch manifest, manuscripts tied to run_id,
#    novel feature metadata, and MCP manifests when advertised. The
#    publish-skill PR body sections are suggested from these artifacts,
#    but artifact completeness remains the source of truth.

on:
  pull_request:
    paths:
      - 'library/**'
      - 'cli-skills/**'
      - 'registry.json'
      - 'tools/generate-skills/**'
      - 'tools/sweep-canonical/**'
      - '.github/scripts/verify-attribution/**'
      - '.github/scripts/verify-publish-package/**'
      - '.github/workflows/verify-library-conventions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fail on changes to generated artifacts
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # registry.json and cli-skills/pp-*/SKILL.md are regenerated
          # post-merge by generate-registry.yml and generate-skills.yml
          # and committed back to main with [skip ci]. Any PR commit
          # that changes them is silently overwritten on the next regen
          # and produces gnarly merge conflicts in the interim. The fix
          # is identical for fork and same-repo PRs (drop the files
          # from the diff), so this single check replaces the older
          # Guard + auto-fix + fork-only drift trio.
          #
          # cli-skills/AGENTS.md and other meta files under cli-skills/
          # are hand-maintained; only pp-*/SKILL.md is generated.

          git remote add base "https://github.com/${BASE_REPO}.git" 2>/dev/null \
            || git remote set-url base "https://github.com/${BASE_REPO}.git"
          base_remote_ref="refs/remotes/base/${BASE_REF}"
          git fetch --no-tags base "${BASE_REF}:${base_remote_ref}"

          violations=$(git diff --name-only "${base_remote_ref}...HEAD" \
            -- 'registry.json' 'cli-skills/pp-*/SKILL.md')

          if [ -z "$violations" ]; then
            echo "No changes to generated artifacts. OK."
            exit 0
          fi

          echo "::error::This PR modifies generated artifacts that are regenerated post-merge:"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "::error file=${file}::Remove this file from the PR. It is regenerated post-merge by generate-registry.yml or generate-skills.yml."
          done <<< "$violations"
          echo
          echo "::error::Edit the source instead:"
          echo "::error::  - registry.json source: library/<cat>/<slug>/.printing-press.json + manifest.json"
          echo "::error::  - cli-skills/pp-<slug>/SKILL.md source: library/<cat>/<slug>/SKILL.md"
          exit 1

      - name: Guard CLI attribution
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base_remote_ref="refs/remotes/base/${BASE_REF}"
          python3 .github/scripts/verify-attribution/verify_attribution.py --base "${base_remote_ref}"

      - name: Publish package completeness
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git remote add base "https://github.com/${BASE_REPO}.git" 2>/dev/null || git remote set-url base "https://github.com/${BASE_REPO}.git"
          base_remote_ref="refs/remotes/base/${BASE_REF}"
          if ! git show-ref --verify --quiet "${base_remote_ref}"; then
            git fetch --no-tags base "${BASE_REF}:${base_remote_ref}"
          fi

          python3 .github/scripts/verify-publish-package/verify_publish_package.py --base-ref "${base_remote_ref}"

      - name: go.mod module path matches directory
        run: |
          set -euo pipefail
          fail=0
          for gomod in library/*/*/go.mod; do
            dir="${gomod%/go.mod}"
            expected="github.com/mvanhorn/printing-press-library/${dir}"
            declared=$(awk '/^module / {print $2; exit}' "$gomod")
            if [ "$expected" != "$declared" ]; then
              echo "::error file=${gomod}::module path mismatch: directory implies ${expected}, go.mod declares ${declared}. Public \`go install\` against this CLI will fail with 'module declares its path as X but was required as Y'."
              fail=1
            fi
          done
          if [ "$fail" = 1 ]; then
            exit 1
          fi
          echo "All library/*/*/go.mod module declarations match their directories."
